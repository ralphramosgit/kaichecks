# Local testing for the Kaichecks API container.
#
# Run from the backend/docker/ folder:
#   docker compose up --build
# Then open http://localhost:8000/docs
#
# The build context is the parent backend/ folder so the Dockerfile can copy in
# both the fastAPI app and the trained models.

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: kaichecks-api:latest
    container_name: kaichecks-api
    ports:
      - "8000:8000"
    environment:
      # Next.js dev server origin so the browser allows cross-origin calls.
      KAICHECKS_CORS_ORIGINS: "http://localhost:3000"
      # AWS (later): models come from S3 instead of being baked into the image.
      # KAICHECKS_MODELS_S3_BUCKET: "kaichecks-models"
      # KAICHECKS_MODELS_S3_PREFIX: "models/"
    restart: unless-stopped
